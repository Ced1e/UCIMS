<div class="page" id="page-doctor">
  <div class="topbar">
    <div class="topbar-logo">
      <img id="topbar-logo-doctor" src="" alt="USeP" style="width:36px;height:36px;border-radius:50%;border:2px solid rgba(201,162,39,0.6);object-fit:cover;">
      <div class="tl-text"><span class="tl-title">UCIMS</span><span>Medical Doctor Dashboard</span></div>
    </div>
    <div class="topbar-right">
      <div class="topbar-user" id="doctor-topbar-name"></div>

    </div>

  <div class="layout">

        <img id="sb-logo-doctor" src="" alt="USeP">

      <div class="sidebar-section">Consultations</div>
      <a class="active" id="dn-consult" onclick="docNav('consult')"><span class="icon">🩺</span> Active Consultations</a>
      <div class="sidebar-section">Medical</div>
      <a id="dn-exam" onclick="docNav('exam')"><span class="icon">🔬</span> Medical Examination</a>

      <a id="dn-approvals" onclick="docNav('approvals')"><span class="icon">✅</span> Approvals</a>
      <div class="sidebar-section">Logs</div>
      <a id="dn-dailylog" onclick="docNav('dailylog')"><span class="icon">📅</span> Daily Patient Log</a>

    <div class="main" id="doctor-main"></div>
  </div>
